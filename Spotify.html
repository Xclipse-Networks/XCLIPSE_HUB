<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XCLIPSE // CORE_ENGINE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;800&display=swap');

        :root {
            --accent: #00ff66; 
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --progress: 0%;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Archivo Black', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* BOOT OVERLAY */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }
        #boot-screen.loaded { transform: translateY(-100%); }
        #boot-log { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); letter-spacing: 2px; }

        /* BACKGROUND */
        #blur-bg { 
            position: fixed; 
            inset: -20%; 
            background-size: cover; 
            background-position: center;
            filter: blur(80px) brightness(0.35); 
            z-index: -1; 
            transition: 1.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* NAVIGATION */
        nav { width: 100%; padding: 30px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .nav-btn { font-family: 'JetBrains Mono'; font-size: 10px; letter-spacing: 2px; cursor: pointer; border: 1px solid var(--border); padding: 10px 20px; background: var(--glass); backdrop-filter: blur(10px); }
        #user-status { font-family: 'JetBrains Mono'; font-size: 9px; color: #ff4444; letter-spacing: 2px; padding: 10px 15px; background: rgba(0,0,0,0.3); border-right: 2px solid #ff4444; }

        /* DRAWER */
        #playlist-drawer { position: fixed; inset: 0; background: rgba(0,0,0,0.98); backdrop-filter: blur(50px); z-index: 110; transform: translateX(100%); transition: 0.5s cubic-bezier(0.8, 0, 0.2, 1); padding: 80px 40px; overflow-y: auto; }
        #playlist-drawer.open { transform: translateX(0); }
        .link-btn { display: inline-block; padding: 15px 25px; background: var(--accent); color: #000; font-family: 'JetBrains Mono'; font-weight: 800; cursor: pointer; border: none; width: 100%; }
        .playlist-item { padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 16px; cursor: pointer; color: rgba(255,255,255,0.4); }

        /* VISUALIZER */
        #v-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: flex-end; gap: 4px; height: 40px; z-index: 10; }
        .v-bar { width: 3px; background: var(--accent); height: 2px; transition: height 0.15s ease; box-shadow: 0 0 10px var(--accent); }

        /* GRID CONTENT */
        .grid-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 40px; }
        .art-frame { position: relative; padding: 10px; border: 1px solid var(--border); background: var(--glass); }
        #main-art { width: 75vw; max-width: 340px; aspect-ratio: 1; object-fit: cover; }

        /* GLITCH ANIMATION */
        .glitch { animation: glitch 0.3s height; }
        @keyframes glitch {
            0% { transform: translate(0); filter: hue-rotate(0deg); }
            20% { transform: translate(-5px, 5px); filter: hue-rotate(90deg); }
            40% { transform: translate(5px, -5px); }
            100% { transform: translate(0); filter: hue-rotate(0deg); }
        }

        .music-meta { text-align: center; }
        #track-title { font-size: 22px; letter-spacing: 4px; margin-bottom: 8px; }
        #artist-name { font-size: 10px; font-family: 'JetBrains Mono'; color: var(--accent); letter-spacing: 6px; }

        /* FOOTER */
        .footer-ctrl { width: 100%; padding: 40px; border-top: 1px solid var(--border); }
        .bar-bg { height: 1px; background: rgba(255,255,255,0.05); width: 100%; margin-bottom: 25px; position: relative; }
        .bar-fill { height: 100%; width: var(--progress); background: var(--accent); position: absolute; transition: 0.4s linear; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; width: 100%; }
        .c-btn { background: none; border: none; color: #fff; font-family: 'JetBrains Mono'; font-size: 10px; cursor: pointer; opacity: 0.4; }
    </style>
</head>
<body>

    <div id="boot-screen"><div id="boot-log">> XCLIPSE_CORE_BOOT...</div></div>
    <div id="blur-bg"></div>

    <nav>
        <span class="nav-btn" onclick="toggleNav()">// MENU</span>
        <div id="user-status">● OFFLINE</div>
    </nav>

    <div id="playlist-drawer">
        <div id="auth-section"><div class="link-btn" id="login-trigger" onclick="Spotify.login()">INITIATE_AUTH</div></div>
        <div id="playlist-list"></div>
        <div id="logout-section" style="display:none; margin-top:30px;">
            <span style="color:#ff4444; font-family:'JetBrains Mono'; cursor:pointer; font-size:10px;" onclick="Spotify.logout()">> TERMINATE_SESSION</span>
        </div>
        <div class="nav-btn" onclick="toggleNav()" style="margin-top: 40px; width: 100%; text-align:center;">CLOSE_X</div>
    </div>

    <div class="grid-container">
        <div class="art-frame" id="art-holder">
            <div id="v-container">
                <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
            </div>
            <img id="main-art" src="">
        </div>
        <div class="music-meta">
            <div id="track-title">SIGNAL_LOST</div>
            <div id="artist-name">AWAITING_UPLINK</div>
        </div>
    </div>

    <div class="footer-ctrl">
        <div class="bar-bg"><div class="bar-fill"></div></div>
        <div class="btn-group">
            <button class="c-btn" onclick="Spotify.cmd('previous')">PREV</button>
            <button class="c-btn" id="play-pause-btn" onclick="Spotify.cmd('toggle')">RESUME</button>
            <button class="c-btn" onclick="Spotify.cmd('next')">NEXT</button>
        </div>
    </div>

    <script src="spotify.js"></script>
    <script>
        function toggleNav() { document.getElementById('playlist-drawer').classList.toggle('open'); if(Spotify.token) Spotify.loadPlaylists(); }

        async function init() {
            const code = new URLSearchParams(window.location.search).get('code');
            if (code) {
                document.getElementById('boot-log').innerText = "> SYNCHRONIZING_TOKEN...";
                await Spotify.getToken(code);
                window.history.pushState({}, document.title, window.location.pathname);
            }
            
            if (Spotify.token) {
                const user = await Spotify.getUserProfile();
                if (user) {
                    document.getElementById('user-status').style.color = "var(--accent)";
                    document.getElementById('user-status').innerText = "● " + user.display_name.toUpperCase();
                    document.getElementById('login-trigger').style.display = 'none';
                    document.getElementById('logout-section').style.display = 'block';
                }
            }
            
            setTimeout(() => document.getElementById('boot-screen').classList.add('loaded'), 1500);
            
            const mainLoop = async () => {
                await Spotify.sync();
                setTimeout(mainLoop, (Spotify.timeLeft < 10000 && Spotify.isPlaying) ? 1000 : 4000);
            };
            mainLoop();
        }
        window.onload = init;
    </script>
</body>
</html>
