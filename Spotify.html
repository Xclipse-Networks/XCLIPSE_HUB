<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XCLIPSE // CORE_ENGINE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;800&display=swap');

        :root {
            --accent: #00ff66; 
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Archivo Black', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        
        #blur-bg { 
            position: fixed; 
            inset: -20%; 
            background-size: cover; 
            background-position: center;
            filter: blur(100px) brightness(0.35) saturate(1.8); 
            z-index: -1; 
            transition: 1.5s cubic-bezier(0.2, 1, 0.3, 1); 
        }

        /* TOP NAVIGATION */
        nav {
            width: 100%;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .nav-btn { 
            font-family: 'JetBrains Mono'; 
            font-size: 11px; 
            font-weight: 800;
            letter-spacing: 4px; 
            cursor: pointer; 
            border: 1px solid var(--border); 
            padding: 12px 24px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 4px;
            transition: 0.3s;
        }

        .nav-btn:hover { 
            border-color: var(--accent); 
            color: var(--accent); 
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.3);
        }

        /* MASSIVE 12H CLOCK */
        #clock { 
            font-family: 'Archivo Black', sans-serif; 
            font-size: 38px; /* Slightly smaller to fit AM/PM */
            line-height: 1;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, rgba(255,255,255,0.2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: right;
            white-space: nowrap;
        }

        /* PLAYLIST DRAWER */
        #playlist-drawer {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(50px);
            z-index: 110;
            transform: scale(1.1);
            opacity: 0;
            visibility: hidden;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 100px 40px;
            overflow-y: auto;
        }
        
        #playlist-drawer.open { 
            transform: scale(1);
            opacity: 1;
            visibility: visible;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .close-btn {
            font-family: 'JetBrains Mono';
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            transition: 0.3s;
        }

        .close-btn:hover {
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }
        
        .playlist-item {
            padding: 25px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 36px;
            letter-spacing: -2px;
            cursor: pointer;
            transition: 0.3s;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
        }
        
        .playlist-item:hover { 
            color: var(--accent); 
            padding-left: 15px;
        }

        /* CONTENT AREA */
        .grid-container { 
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .art-wrapper {
            position: relative;
            padding: 12px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 40px;
            transition: 0.5s transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #main-art { 
            width: 82vw; 
            max-width: 360px; 
            aspect-ratio: 1; 
            border-radius: 30px;
            object-fit: cover;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .music-meta { text-align: center; padding: 0 40px; }
        
        #track-title { 
            font-size: 12vw; 
            line-height: 0.8; 
            margin-bottom: 15px; 
            text-transform: uppercase;
            letter-spacing: -4px;
        }
        
        #artist-name { 
            font-size: 13px; 
            font-family: 'JetBrains Mono'; 
            color: var(--accent);
            letter-spacing: 7px; 
            opacity: 0.8;
        }

        /* FOOTER */
        .footer-ctrl { 
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .bar-bg { height: 4px; background: rgba(255,255,255,0.05); width: 100%; }
        .bar-fill { 
            height: 100%; 
            width: var(--progress, 0%); 
            background: var(--accent); 
            box-shadow: 0 0 20px var(--accent);
            transition: 0.4s linear; 
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1.5fr 1fr; width: 100%; }
        
        .c-btn { 
            background: none; 
            border: none; 
            color: #fff; 
            font-family: 'JetBrains Mono'; 
            font-size: 12px; 
            font-weight: 800;
            padding: 55px 0; 
            cursor: pointer; 
            transition: 0.2s;
            opacity: 0.4;
        }

        .c-btn:active { opacity: 1; background: var(--glass); color: var(--accent); }
        
        #play-pause-btn { 
            font-size: 22px; 
            opacity: 1;
            background: rgba(255,255,255,0.02);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div id="blur-bg"></div>

    <nav>
        <span class="nav-btn" onclick="toggleNav()">PLAYLISTS</span>
        <div id="clock">12:00 AM</div>
    </nav>

    <div id="playlist-drawer">
        <div class="drawer-header">
            <h2 style="font-size: 10px; font-family: 'JetBrains Mono'; letter-spacing: 8px; color: var(--accent);">// UPLINK_DIRECTORY</h2>
            <span class="close-btn" onclick="toggleNav()">[ CLOSE_X ]</span>
        </div>
        <div id="playlist-list"></div>
    </div>

    <div class="grid-container">
        <div class="art-wrapper" id="art-container">
            <img id="main-art" src="" alt="">
        </div>

        <div class="music-meta">
            <div id="track-title">STATION_IDLE</div>
            <div id="artist-name">AWAITING_SIGNAL</div>
        </div>

        <div class="footer-ctrl">
            <div class="bar-bg"><div class="bar-fill"></div></div>
            <div class="btn-group">
                <button class="c-btn" onclick="Spotify.cmd('previous')">PREV</button>
                <button class="c-btn" id="play-pause-btn" onclick="Spotify.cmd('toggle')">PLAY</button>
                <button class="c-btn" onclick="Spotify.cmd('next')">NEXT</button>
            </div>
        </div>
    </div>

    <script src="spotify.js"></script>
    <script>
        function toggleNav() {
            const drawer = document.getElementById('playlist-drawer');
            const isOpen = drawer.classList.toggle('open');
            if(isOpen) Spotify.loadPlaylists();
        }

        function updateClock() {
            const now = new Date();
            // hour12: true enabled
            const timeStr = now.toLocaleTimeString([], {
                hour: '2-digit', 
                minute: '2-digit', 
                hour12: true
            }).toUpperCase(); 
            
            document.getElementById('clock').innerText = timeStr;
        }

        function pulseArt(isPlaying) {
            const art = document.getElementById('art-container');
            if(isPlaying) {
                art.style.transform = "scale(1.03)";
                setTimeout(() => art.style.transform = "scale(1.0)", 1000);
            }
        }

        setInterval(updateClock, 1000);
        setInterval(() => {
            if (typeof Spotify !== 'undefined' && Spotify.sync) {
                Spotify.sync();
                if(typeof SPOT_CONFIG !== 'undefined' && SPOT_CONFIG.isPlaying) pulseArt(true);
            }
        }, 3000);
        
        window.onload = () => {
            updateClock();
            if (typeof Spotify !== 'undefined' && Spotify.sync) {
                Spotify.sync();
            }
        }
    </script>
</body>
</html>
