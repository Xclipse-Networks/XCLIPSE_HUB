<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>XCLIPSE // CORE_ENGINE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --accent: #00ff66; --bg-dark: #050505; --progress: 0%; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Archivo Black', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #boot-screen { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; justify-content: center; align-items: center; transition: 0.8s; }
        #boot-screen.loaded { transform: translateY(-100%); }
        #boot-log { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); letter-spacing: 2px; }

        #blur-bg { position: fixed; inset: -20%; background-size: cover; filter: blur(80px) brightness(0.4); z-index: -1; transition: 1.5s; }
        
        nav { padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { font-family: 'JetBrains Mono'; font-size: 11px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); padding: 12px 24px; background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); }

        #playlist-drawer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 110; transform: scale(1.1); opacity: 0; visibility: hidden; transition: 0.4s; padding: 100px 40px; }
        #playlist-drawer.open { transform: scale(1); opacity: 1; visibility: visible; }
        
        .link-btn { display: block; width: 100%; padding: 15px; background: var(--accent); color: #000; font-family: 'JetBrains Mono'; font-weight: 800; text-align: center; cursor: pointer; margin-bottom: 30px; }
        .playlist-item { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); cursor: pointer; }
        .playlist-item:hover { color: var(--accent); }

        .grid-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 40px; }
        #main-art { width: 80vw; max-width: 350px; aspect-ratio: 1; border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .music-meta { text-align: center; }
        #track-title { font-size: 24px; letter-spacing: 2px; }
        #artist-name { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); margin-top: 10px; }

        .footer-ctrl { width: 100%; padding: 40px; }
        .bar-bg { height: 2px; background: rgba(255,255,255,0.1); width: 100%; }
        .bar-fill { height: 100%; width: var(--progress); background: var(--accent); transition: 0.4s linear; }
        .btn-group { display: flex; justify-content: space-between; margin-top: 20px; }
        .c-btn { background: none; border: none; color: #fff; font-family: 'JetBrains Mono'; cursor: pointer; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="boot-screen"><div id="boot-log">> SYSTEM_BOOTING...</div></div>
    <div id="blur-bg"></div>

    <nav><span class="nav-btn" onclick="toggleNav()">PLAYLISTS</span></nav>

    <div id="playlist-drawer">
        <div class="link-btn" onclick="Spotify.login()">// LINK_SPOTIFY_ACCOUNT</div>
        <div id="playlist-list"></div>
        <div class="nav-btn" onclick="toggleNav()" style="margin-top: 20px; text-align: center;">CLOSE</div>
    </div>

    <div class="grid-container">
        <img id="main-art" src="">
        <div class="music-meta">
            <div id="track-title">OFFLINE</div>
            <div id="artist-name">AWAITING_UPLINK</div>
        </div>
    </div>

    <div class="footer-ctrl">
        <div class="bar-bg"><div class="bar-fill"></div></div>
        <div class="btn-group">
            <button class="c-btn" onclick="Spotify.cmd('previous')">PREV</button>
            <button class="c-btn" id="play-pause-btn" onclick="Spotify.cmd('toggle')">PLAY</button>
            <button class="c-btn" onclick="Spotify.cmd('next')">NEXT</button>
        </div>
    </div>

    <script src="spotify.js"></script>
    <script>
        function toggleNav() {
            const dr = document.getElementById('playlist-drawer');
            if(dr.classList.toggle('open')) Spotify.loadPlaylists();
        }

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                document.getElementById('boot-log').innerText = "> EXCHANGE_TOKEN...";
                await Spotify.getToken(code);
                window.history.pushState({}, document.title, window.location.pathname);
            }
            
            setTimeout(() => document.getElementById('boot-screen').classList.add('loaded'), 1000);
            
            // Auto-Sync Loop
            const syncLoop = async () => {
                await Spotify.sync();
                let wait = (Spotify.timeLeft < 10000 && Spotify.isPlaying) ? 1000 : 3000;
                setTimeout(syncLoop, wait);
            };
            syncLoop();
        }

        window.onload = init;
    </script>
</body>
</html>
