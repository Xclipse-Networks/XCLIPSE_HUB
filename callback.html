<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XCLIPSE // UPLINK_BRIDGE</title>
    <style>
        body { background: #050505; color: #00ff66; font-family: 'JetBrains Mono', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; letter-spacing: 2px; font-size: 10px; }
    </style>
</head>
<body>
    <div id="status">> SECURING_TUNNEL...</div>
    <script>
        window.onload = () => {
            const code = new URLSearchParams(window.location.search).get('code');
            if (code) {
                // Redirect back to your main page with the code
                window.location.href = 'spotify.html?code=' + code;
            } else {
                document.getElementById('status').innerText = "> AUTH_ERROR: NO_CODE_DETECTED";
                setTimeout(() => { window.location.href = 'spotify.html'; }, 2000);
            }
        };
    </script>
</body>
</html>
